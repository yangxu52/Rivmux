name: Release Package

on:
  push:
    tags: ['*@*.*.*']

permissions:
  id-token: write
  contents: write

jobs:
  release-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve package from tag
        id: package
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          package_dir="${tag%@*}"
          version="${tag##*@}"
          package_json="packages/${package_dir}/package.json"

          if [[ "${package_dir}" == "${tag}" || -z "${package_dir}" || -z "${version}" ]]; then
            echo "::error::Tag must use the format <package-directory>@<version>, for example player@0.1.0."
            exit 1
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version in tag '${tag}'."
            exit 1
          fi

          if [[ ! -f "${package_json}" ]]; then
            echo "::error::Package directory '${package_dir}' does not exist under packages/."
            exit 1
          fi

          package_name="$(node -p "require('./${package_json}').name")"
          package_version="$(node -p "require('./${package_json}').version")"

          if [[ "${package_version}" != "${version}" ]]; then
            echo "::error::Tag version '${version}' does not match ${package_json} version '${package_version}'."
            exit 1
          fi

          echo "dir=${package_dir}" >> "${GITHUB_OUTPUT}"
          echo "name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build package
        run: pnpm --filter ./packages/${{ steps.package.outputs.dir }}... run build

      - name: Publish package
        run: pnpm --filter ./packages/${{ steps.package.outputs.dir }} publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release for tag
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.package.outputs.name }} v${{ steps.package.outputs.version }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          body: |
            Please refer to [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/packages/${{ steps.package.outputs.dir }}/CHANGELOG.md) for details.
