name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked

      - name: Install wasm-opt
        run: cargo install wasm-opt --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release version
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ "${version}" == "${tag}" || -z "${version}" ]]; then
            echo "::error::Tag must use the format v<version>, for example v0.1.0."
            exit 1
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version in tag '${tag}'."
            exit 1
          fi

          release_packages=(
            "packages/protocol/package.json"
            "packages/runtime-worker/package.json"
            "packages/player/package.json"
          )

          for package_json in "${release_packages[@]}"; do
            package_name="$(node -p "require('./${package_json}').name")"
            package_version="$(node -p "require('./${package_json}').version")"

            if [[ "${package_version}" != "${version}" ]]; then
              echo "::error::Tag version '${version}' does not match ${package_name} version '${package_version}' in ${package_json}."
              exit 1
            fi
          done

          if [[ "${tag}" == *alpha* || "${tag}" == *beta* || "${tag}" == *rc* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Run lint check
        run: pnpm run lint:check

      - name: Run Rust clippy
        run: pnpm run clippy

      - name: Run type check
        run: pnpm run typecheck

      - name: Run test
        run: pnpm run test:ci

      - name: Run build
        run: pnpm run build:release

      - name: Publish packages
        run: |
          pnpm --filter @rivmux/protocol publish --access public --no-git-checks
          pnpm --filter @rivmux/runtime-worker publish --access public --no-git-checks
          pnpm --filter rivmux publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release for tag
        uses: softprops/action-gh-release@v3
        with:
          name: Rivmux v${{ steps.release.outputs.version }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          body: |
            Please refer to [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
